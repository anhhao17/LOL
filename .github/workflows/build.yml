name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend (C++)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build \
            libboost-all-dev \
            libssl-dev \
            nlohmann-json3-dev \
            libspdlog-dev \
            libfmt-dev \
            libsqlite3-dev \
            libsodium-dev \
            libavformat-dev \
            libavcodec-dev \
            libswscale-dev \
            libavutil-dev \
            pkg-config

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: avenger-linux-amd64
          path: build/avenger
          retention-days: 7

  ui:
    name: UI (Vue / Vite)
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install
        working-directory: ui
        run: npm ci

      - name: Build
        working-directory: ui
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 7

  test:
    name: API Tests (pytest)
    runs-on: ubuntu-24.04
    needs: [backend, ui]

    steps:
      - uses: actions/checkout@v4

      - name: Install C++ runtime dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libboost-system1.83.0 \
            libssl3 \
            libspdlog1.12 \
            libfmt9 \
            libsqlite3-0 \
            libsodium23 \
            libavformat60 \
            libavcodec60 \
            libswscale7 \
            libavutil58

      - name: Download backend binary
        uses: actions/download-artifact@v4
        with:
          name: avenger-linux-amd64
          path: build/

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: tests/requirements.txt

      - name: Install test dependencies
        run: pip install -r tests/requirements.txt

      - name: Start server
        run: |
          chmod +x build/avenger
          build/avenger \
            --web-root ui/dist \
            --port 8080 \
            --log-level info &
          # Wait for the server to be ready
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8080/ && break
            sleep 1
          done

      - name: Run auth & middleware tests
        working-directory: tests
        env:
          BASE_URL: http://127.0.0.1:8080
        run: pytest test_auth.py test_middleware.py -v --timeout=60

      - name: Run stream HTTP validation tests
        working-directory: tests
        env:
          BASE_URL: http://127.0.0.1:8080
        # WebSocket frame tests require --video-cl/--video-ir files which CI doesn't have.
        # TestStreamHttpValidation only exercises pre-upgrade HTTP rejection paths.
        run: pytest test_stream.py::TestStreamHttpValidation -v --timeout=30
